name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # Setup Node targeting the subfolder package-lock
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ./aditya-portfolio/package-lock.json
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
          
      # Cache specifically looking inside aditya-portfolio
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ./aditya-portfolio/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('aditya-portfolio/**/package-lock.json') }}-${{ hashFiles('aditya-portfolio/**.[jt]s', 'aditya-portfolio/**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('aditya-portfolio/**/package-lock.json') }}-
            
      # Install dependencies INSIDE the folder
      - name: Install dependencies
        run: npm ci
        working-directory: ./aditya-portfolio
        
      # Build INSIDE the folder
      - name: Build with Next.js
        run: npm run build
        working-directory: ./aditya-portfolio
        
      # Upload the artifact from the correct subfolder out path
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./aditya-portfolio/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4